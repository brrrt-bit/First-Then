<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 할 일 - AI First-Then Board</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #f8fafc;
            touch-action: manipulation;
        }
        .card-upload {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            aspect-ratio: 1 / 1;
        }
        .card-upload:hover {
            transform: translateY(-5px);
        }
        .image-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.5rem;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .bounce-arrow {
            animation: bounce 2s infinite;
        }
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- 상단 타이틀 -->
    <header class="text-center mt-6 mb-8">
        <h1 class="text-4xl md:text-6xl font-bold text-indigo-600 mb-2">오늘의 할 일</h1>
        <p class="text-lg md:text-xl text-indigo-400">사진을 직접 올리거나 AI로 만들어보세요!</p>
    </header>

    <!-- AI 이미지 생성 섹션 -->
    <section class="w-full max-w-2xl bg-white p-6 rounded-[2rem] shadow-lg border-2 border-indigo-100 mb-10">
        <h2 class="text-2xl font-bold text-indigo-700 mb-4 flex items-center gap-2">
            <span>✨ AI 이미지 만들기</span>
        </h2>
        <div class="flex flex-col gap-3">
            <div class="relative">
                <input type="text" id="ai-prompt" placeholder="예: 사과 먹기, 장난감 놀이 (영어로 쓰면 더 잘 나와요)" 
                    class="w-full px-6 py-4 rounded-2xl border-2 border-indigo-200 focus:border-indigo-500 outline-none text-xl shadow-inner">
            </div>
            <button id="generate-ai-btn" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white text-2xl font-bold py-4 rounded-2xl transition-all shadow-md active:scale-95 disabled:bg-gray-400">
                AI 이미지 만들기
            </button>
        </div>

        <!-- AI 로딩 상태 -->
        <div id="ai-loading" class="hidden flex-col items-center justify-center py-8">
            <div class="loading-spinner mb-4"></div>
            <p id="loading-text" class="text-indigo-500 text-xl font-bold text-center">AI가 그림을 그리고 있어요... (약 10초)</p>
        </div>

        <!-- AI 결과 영역 -->
        <div id="ai-results" class="hidden mt-6 flex flex-col items-center">
            <div class="relative w-full max-w-[300px] group cursor-pointer border-4 border-indigo-500 rounded-3xl overflow-hidden shadow-xl">
                <img id="ai-output-img" class="w-full h-auto">
                <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center gap-4 transition-opacity p-4">
                    <p class="text-white text-xl font-bold mb-2">어디에 넣을까요?</p>
                    <div class="flex gap-2 w-full">
                        <button id="btn-to-first" class="flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold hover:bg-orange-600 transition-colors">먼저</button>
                        <button id="btn-to-then" class="flex-1 bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition-colors">그다음</button>
                    </div>
                </div>
            </div>
            <p class="mt-4 text-indigo-500 text-lg">이미지를 눌러서 칸을 선택하세요!</p>
        </div>
    </section>

    <!-- 메인 보드 영역 -->
    <main class="w-full max-w-5xl flex flex-col md:flex-row items-start justify-center gap-4 md:gap-8 flex-grow">
        
        <!-- 먼저 (First) 카드 섹션 -->
        <div class="flex-1 w-full flex flex-col items-center">
            <span class="text-2xl md:text-3xl font-bold text-orange-500 mb-3 bg-orange-100 px-6 py-1 rounded-full">먼저 (First)</span>
            <div id="first-card" class="card-upload relative w-full bg-white border-4 border-dashed border-orange-300 rounded-[2rem] shadow-xl cursor-pointer flex items-center justify-center overflow-hidden hover:border-orange-500 group mb-6">
                <input type="file" id="first-input" class="hidden" accept="image/*">
                <div id="first-placeholder" class="text-center p-4">
                    <div class="text-6xl mb-2 text-orange-300 group-hover:scale-110 transition-transform">📸</div>
                    <p class="text-orange-400 text-xl">사진 클릭/AI 이미지 선택</p>
                </div>
                <img id="first-img" class="image-preview hidden">
                <button id="first-change" class="hidden absolute bottom-4 right-4 bg-black/50 text-white px-3 py-1 rounded-full text-sm">바꾸기</button>
            </div>
            
            <!-- 완료 버튼 (먼저 카드 바로 아래 배치) -->
            <button id="complete-btn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-2xl md:text-3xl font-bold py-5 rounded-full shadow-lg transform transition active:scale-95 border-b-8 border-yellow-600">
                완료했어요! ✨
            </button>
        </div>

        <!-- 화살표 (수직 중앙 정렬을 위해 md:mt-36으로 조정) -->
        <div class="flex items-center justify-center py-4 md:mt-36">
            <span class="text-5xl md:text-7xl bounce-arrow">➡️</span>
        </div>

        <!-- 그다음 (Then) 카드 섹션 -->
        <div class="flex-1 w-full flex flex-col items-center">
            <span class="text-2xl md:text-3xl font-bold text-green-500 mb-3 bg-green-100 px-6 py-1 rounded-full">그다음 (Then)</span>
            <div id="then-card" class="card-upload relative w-full bg-white border-4 border-dashed border-green-300 rounded-[2rem] shadow-xl cursor-pointer flex items-center justify-center overflow-hidden hover:border-green-500 group">
                <input type="file" id="then-input" class="hidden" accept="image/*">
                <div id="then-placeholder" class="text-center p-4">
                    <div class="text-6xl mb-2 text-green-300 group-hover:scale-110 transition-transform">🎁</div>
                    <p class="text-green-400 text-xl">사진 클릭/AI 이미지 선택</p>
                </div>
                <img id="then-img" class="image-preview hidden">
                <button id="then-change" class="hidden absolute bottom-4 right-4 bg-black/50 text-white px-3 py-1 rounded-full text-sm">바꾸기</button>
            </div>
        </div>

    </main>

    <!-- 제작자 정보 -->
    <footer class="mt-16 mb-4 text-gray-400 text-sm font-sans">
        made by abloggg
    </footer>

    <!-- 알림 모달 -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[3rem] p-10 text-center max-w-sm w-full shadow-2xl">
            <div class="text-7xl mb-4">🏆</div>
            <h2 class="text-4xl font-bold text-gray-800 mb-4">정말 최고예요!</h2>
            <p class="text-xl text-gray-600 mb-8">약속을 잘 지켰네요!<br>이제 즐겁게 놀아요!</p>
            <button id="modal-close" class="w-full bg-blue-500 text-white text-2xl font-bold py-4 rounded-2xl">다시 하기</button>
        </div>
    </div>

    <!-- 간단한 알림 메시지 (toast) -->
    <div id="toast" class="fixed bottom-10 bg-gray-800 text-white px-6 py-3 rounded-full opacity-0 transition-opacity pointer-events-none z-[100]">
        이미지가 생성되었습니다!
    </div>

    <script>
        const apiKey = ""; // 환경에서 자동 제공됨
        
        // 요소 선택
        const aiPromptInput = document.getElementById('ai-prompt');
        const generateAiBtn = document.getElementById('generate-ai-btn');
        const aiLoading = document.getElementById('ai-loading');
        const aiResults = document.getElementById('ai-results');
        const aiOutputImg = document.getElementById('ai-output-img');
        const btnToFirst = document.getElementById('btn-to-first');
        const btnToThen = document.getElementById('btn-to-then');
        const toast = document.getElementById('toast');

        const firstCard = document.getElementById('first-card');
        const firstInput = document.getElementById('first-input');
        const firstImg = document.getElementById('first-img');
        const firstPlaceholder = document.getElementById('first-placeholder');
        const firstChange = document.getElementById('first-change');

        const thenCard = document.getElementById('then-card');
        const thenInput = document.getElementById('then-input');
        const thenImg = document.getElementById('then-img');
        const thenPlaceholder = document.getElementById('then-placeholder');
        const thenChange = document.getElementById('then-change');

        const completeBtn = document.getElementById('complete-btn');
        const modal = document.getElementById('modal');
        const modalClose = document.getElementById('modal-close');

        let currentAiImgData = null;

        // 이미지 생성 API
        async function fetchImage(prompt, retryCount = 0) {
            try {
                const optimizedPrompt = `A simple, colorful, clear illustration for a child's visual schedule: ${prompt}. White background, no text.`;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: optimizedPrompt }] }],
                        generationConfig: { responseModalities: ["IMAGE"] }
                    })
                });

                if (!response.ok) {
                    if (retryCount < 5) {
                        const delay = Math.pow(2, retryCount) * 1000;
                        await new Promise(res => setTimeout(res, delay));
                        return fetchImage(prompt, retryCount + 1);
                    }
                    throw new Error(`API Status: ${response.status}`);
                }

                const result = await response.json();
                const imagePart = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                
                if (imagePart && imagePart.inlineData.data) {
                    return `data:image/png;base64,${imagePart.inlineData.data}`;
                }
                throw new Error('Image data not found in response');
            } catch (error) {
                console.error("AI Image generation error:", error);
                return null;
            }
        }

        // 이미지 생성 버튼 클릭
        generateAiBtn.addEventListener('click', async () => {
            const prompt = aiPromptInput.value.trim();
            if (!prompt) {
                showToast("무엇을 그릴지 입력해주세요!");
                return;
            }

            aiLoading.classList.remove('hidden');
            aiResults.classList.add('hidden');
            generateAiBtn.disabled = true;

            const imgData = await fetchImage(prompt);

            aiLoading.classList.add('hidden');
            generateAiBtn.disabled = false;

            if (imgData) {
                currentAiImgData = imgData;
                aiOutputImg.src = imgData;
                aiResults.classList.remove('hidden');
                aiResults.classList.add('flex');
                showToast("그림이 완성되었습니다! 보드에 넣어보세요.");
            } else {
                showToast("이미지를 생성하지 못했습니다. 다시 시도해볼까요?");
            }
        });

        btnToFirst.onclick = (e) => {
            e.stopPropagation();
            setCardImage('first', currentAiImgData);
        };

        btnToThen.onclick = (e) => {
            e.stopPropagation();
            setCardImage('then', currentAiImgData);
        };

        function setCardImage(type, data) {
            if (type === 'first') {
                firstImg.src = data;
                firstImg.classList.remove('hidden');
                firstPlaceholder.classList.add('hidden');
                firstChange.classList.remove('hidden');
            } else {
                thenImg.src = data;
                thenImg.classList.remove('hidden');
                thenPlaceholder.classList.add('hidden');
                thenChange.classList.remove('hidden');
            }
            showToast(`${type === 'first' ? '먼저' : '그다음'} 칸에 적용되었습니다!`);
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }

        function handleFileSelect(input, imgElement, placeholder, changeBtn) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    imgElement.src = e.target.result;
                    imgElement.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    changeBtn.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        firstCard.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') firstInput.click();
        });
        thenCard.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') thenInput.click();
        });

        firstInput.addEventListener('change', () => handleFileSelect(firstInput, firstImg, firstPlaceholder, firstChange));
        thenInput.addEventListener('change', () => handleFileSelect(thenInput, thenImg, thenPlaceholder, thenChange));

        // 완료 폭죽
        completeBtn.addEventListener('click', () => {
            const duration = 3000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            setTimeout(() => {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }, 500);
        });

        modalClose.addEventListener('click', () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        });

    </script>
</body>
</html>
